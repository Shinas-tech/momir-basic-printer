[FILESYSTEM]
cards_path = ./cards
art_path = ./cards/art
default_card_art_path = ./img/default_card_art.jpg
access_rights = 0o777

[LOGGING]
log_level = DEBUG
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[PRINTER]
paper_width_mm = 57
paper_width_chars = 38
dpi = 203
vendor_id = 0x1234
product_id = 0x5678

[SCRYFALL]
base_url = https://api.scryfall.com
bulk_data_endpoint = /bulk-data/oracle_cards
header_accept = application/json
header_user_agent = MoritzHayden/momir-basic-printer
request_delay_seconds = 0.05
max_retries = 3
art_width_px = 400
excluded_layouts = token,
                   emblem,
                   art_series,
                   double_faced_token,
                   scheme,
                   planar,
                   phenomenon,
                   vanguard,
                   augment,
                   host
