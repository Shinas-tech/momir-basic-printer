[FILESYSTEM]
cards_path = ./cards
art_path = ./cards/art
default_card_art_path = ./img/default_card_art.jpg
access_rights = 0o777

[LOGGING]
log_level = DEBUG
log_format = [%%(levelname)s] [%%(asctime)s] %%(name)s: %%(message)s
log_date_format = %%Y-%%m-%%d %%H:%%M:%%S

[PRINTER]
paper_width_mm = 57
paper_width_chars = 38
card_art_enabled = True
qr_code_enabled = True
qr_code_size = 6
dpi = 203
vendor_id = 0x1234
product_id = 0x5678
printer_profile = simple
printer_media_width_px = 380

[SCRYFALL]
base_url = https://api.scryfall.com
bulk_data_endpoint = /bulk-data/oracle_cards
header_accept = application/json
header_user_agent = MoritzHayden/momir-basic-printer
header_accept_encoding = gzip
request_delay_seconds = 0.05
max_retries = 3
art_width_px = 380
excluded_sets = funny,
                memorabilia,
                minigame,
                alchemy
excluded_layouts = token,
                   emblem,
                   art_series,
                   double_faced_token,
                   scheme,
                   planar,
                   phenomenon,
                   vanguard,
                   augment,
                   host
