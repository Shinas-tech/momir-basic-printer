[APP]
booting_status = Booting...
ready_status = Ready
refreshing_status = Refreshing...
fetching_status = Fetching...
printing_status = Printing...
cancelled_status = Cancelled
error_status = Error
reset_status = Reset
done_status = Done
done_status_seconds = 2.0
services_unavailable_status = Services N/A
no_cmc_status_template = No CMC {cmc}
shutdown_join_timeout_seconds = 5

[FILESYSTEM]
cards_path = ./cards
art_path = ./cards/art
default_card_art_path = ./img/default_card_art.jpg
access_rights = 0o777

[HARDWARE]
serial_port = /dev/serial0
serial_baud_rate = 9600
printer_dtr_enabled = True
gpio_encoder_clk = 13
gpio_encoder_dt = 6
gpio_encoder_sw = 5
gpio_printer_dtr = 17
printer_dtr_active_high = True
i2c_address = 0x3C
i2c_port = 1
oled_width = 128
oled_height = 64
display_font_size_cmc = 36
display_font_size_status = 12
display_status_y_offset = 52
display_status_default = Ready
display_font_cmc_path = /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
display_font_status_path = /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
display_cmc_prefix = CMC:
display_padding_x = 2
display_cmc_value_gap = 6
hold_time = 1.0
cmc_min = 0
cmc_max = 16
dtr_poll_interval = 0.05
printer_dtr_timeout_seconds = 3.0

[LOGGING]
log_level = DEBUG
log_format = [%%(levelname)s] [%%(asctime)s] %%(name)s: %%(message)s
log_date_format = %%Y-%%m-%%d %%H:%%M:%%S

[PRINTER]
paper_width_mm = 57
paper_width_chars = 32
card_art_enabled = False
qr_code_enabled = True
qr_code_size = 6
dpi = 203
vendor_id = 0x1234
product_id = 0x5678
printer_profile = simple
printer_media_width_px = 380
min_title_spacing = 1
paragraph_spacing = \n\n
text_replacements_json = {"\u2014":"-","\u2013":"-","\u2019":"'","\u201c":"\"","\u201d":"\"","\u2022":"*"}
[SCRYFALL]
base_url = https://api.scryfall.com
bulk_data_endpoint = /bulk-data/oracle_cards
header_accept = application/json
header_user_agent = MoritzHayden/momir-basic-printer
header_accept_encoding = gzip
request_delay_seconds = 0.05
max_retries = 3
art_width_px = 380
excluded_sets = funny,
                memorabilia,
                minigame,
                alchemy
excluded_layouts = token,
                   emblem,
                   art_series,
                   double_faced_token,
                   scheme,
                   planar,
                   phenomenon,
                   vanguard,
                   augment,
                   host
